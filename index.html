<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>週報作成アシスタント</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --warm-bg: #f0f4f8;
            --warm-card: #f8fafc;
            --warm-accent: #3b82b6;
            --warm-accent-light: #60a5e0;
            --warm-green: #5a9e6f;
            --warm-green-light: #e8f5ec;
            --warm-text: #2c3e50;
            --warm-text-light: #6b7c93;
            --warm-border: #d1dce6;
            --warm-shadow: rgba(100,130,160,0.1);
            --warm-user-bg: #3b82b6;
            --warm-bot-bg: #f8fafc;
            --care-bg: #fef3f0;
            --care-border: #f0b8a8;
            --care-text: #8b4a3a;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Hiragino Sans", Meiryo, sans-serif;
            background: var(--warm-bg);
            color: var(--warm-text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #3b82b6, #5a9ec0);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(100,130,160,0.2);
        }

        .header-title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }

        .header-right { display: flex; gap: 8px; align-items: center; }

        .header-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            color: var(--warm-accent);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .header-btn:hover { background: white; }

        .progress-bar-container { height: 4px; background: rgba(255,255,255,0.3); flex-shrink: 0; }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--warm-green), #7ec98f);
            transition: width 0.6s ease;
            width: 0%;
            border-radius: 0 2px 2px 0;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-bot {
            max-width: 85%;
            background: var(--warm-bot-bg);
            border: 1px solid var(--warm-border);
            border-radius: 2px 18px 18px 18px;
            padding: 12px 16px;
            box-shadow: 0 1px 4px var(--warm-shadow);
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 14px;
            animation: fadeIn 0.35s ease;
            color: var(--warm-text);
            word-break: break-word;
        }

        .msg-user {
            max-width: 85%;
            background: var(--warm-user-bg);
            color: white;
            border-radius: 18px 2px 18px 18px;
            padding: 12px 16px;
            align-self: flex-end;
            line-height: 1.8;
            font-size: 14px;
            animation: fadeIn 0.35s ease;
            box-shadow: 0 1px 4px rgba(59,130,182,0.3);
            word-break: break-word;
        }

        .msg-praise {
            max-width: 85%;
            background: linear-gradient(135deg, var(--warm-green-light), #d4edda);
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 14px;
            color: #2d5e3a;
            line-height: 1.8;
            border: 1px solid #b8dcc2;
            animation: fadeIn 0.35s ease;
            word-break: break-word;
        }

        .msg-progress {
            background: linear-gradient(135deg, #e8f0fe, #d4e4f7);
            border-left: 4px solid var(--warm-accent);
            border-radius: 0 8px 8px 0;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--warm-accent);
            font-weight: 600;
            animation: fadeIn 0.35s ease;
        }

        .msg-care {
            max-width: 85%;
            background: var(--care-bg);
            border: 1px solid var(--care-border);
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--care-text);
            line-height: 1.8;
            animation: fadeIn 0.35s ease;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .choices { display: flex; flex-wrap: wrap; gap: 8px; animation: fadeIn 0.35s ease; }

        .choice-btn {
            background: white;
            border: 2px solid var(--warm-accent);
            color: var(--warm-accent);
            border-radius: 24px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-weight: 500;
        }
        .choice-btn:hover { background: var(--warm-accent); color: white; box-shadow: 0 2px 8px rgba(59,130,182,0.3); }
        .choice-btn:active { transform: scale(0.96); }

        .device-cards { display: flex; gap: 12px; animation: fadeIn 0.35s ease; }

        .device-card {
            flex: 1;
            background: white;
            border: 3px solid var(--warm-border);
            border-radius: 14px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            max-width: 160px;
        }
        .device-card:hover { border-color: var(--warm-accent-light); }
        .device-card.selected { border-color: var(--warm-accent); background: #f0f7ff; box-shadow: 0 2px 12px rgba(59,130,182,0.15); }
        .device-card-icon { font-size: 32px; display: block; margin-bottom: 6px; }
        .device-card-label { font-size: 13px; font-weight: 600; color: var(--warm-text); }

        .input-area {
            flex-shrink: 0;
            background: var(--warm-card);
            border-top: 1px solid var(--warm-border);
            padding: 10px 14px;
            display: none;
            gap: 10px;
            align-items: flex-end;
        }
        .input-area.active { display: flex; }

        .input-area textarea {
            flex: 1;
            border: 2px solid var(--warm-border);
            border-radius: 18px;
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 42px;
            max-height: 100px;
            line-height: 1.5;
            outline: none;
            background: white;
            color: var(--warm-text);
            transition: border-color 0.2s;
        }
        .input-area textarea:focus { border-color: var(--warm-accent); }
        .input-area textarea::placeholder { color: #9bb0c4; }

        .send-btn {
            background: var(--warm-accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(59,130,182,0.3);
        }
        .send-btn:hover { background: #2d6a9e; }

        .loading { display: flex; gap: 5px; padding: 12px 16px; }
        .loading span {
            width: 8px; height: 8px;
            background: var(--warm-accent-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40%           { transform: scale(1); }
        }

        .share-banner { display: flex; flex-wrap: wrap; gap: 8px; animation: fadeIn 0.35s ease; margin-top: 4px; }
        .share-banner a, .share-banner button {
            display: flex; align-items: center; gap: 6px;
            background: white; border: 1.5px solid var(--warm-border);
            border-radius: 12px; padding: 10px 14px;
            text-decoration: none; color: var(--warm-text);
            font-size: 13px; font-weight: 500;
            transition: all 0.2s; cursor: pointer; font-family: inherit;
        }
        .share-banner a:hover, .share-banner button:hover {
            border-color: var(--warm-accent); background: #f0f7ff;
            box-shadow: 0 2px 8px var(--warm-shadow);
        }
        .share-icon { font-size: 17px; }

        /* Report overlay */
        .report-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--warm-bg); z-index: 150;
            flex-direction: column; animation: fadeIn 0.3s ease;
        }
        .report-overlay.active { display: flex; }

        .report-overlay-header {
            background: linear-gradient(135deg, var(--warm-green), #4a8a5e);
            color: white; padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .report-overlay-title { font-size: 15px; font-weight: 700; }
        .report-overlay-close {
            background: rgba(255,255,255,0.9); border: none;
            color: var(--warm-green); border-radius: 20px;
            padding: 5px 14px; font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: inherit;
        }

        .report-overlay-body { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

        .report-text {
            background: white; border: 1px solid var(--warm-border);
            border-radius: 12px; padding: 16px;
            font-size: 14px; line-height: 1.9;
            white-space: pre-wrap; word-break: break-word;
            color: var(--warm-text); min-height: 200px; outline: none;
        }
        .report-text:focus { border-color: var(--warm-accent); box-shadow: 0 0 0 2px rgba(59,130,182,0.15); }

        .report-actions {
            flex-shrink: 0; padding: 10px 16px;
            background: var(--warm-card); border-top: 1px solid var(--warm-border);
        }

        .report-bottom-bar {
            flex-shrink: 0; padding: 8px 16px;
            background: var(--warm-bg); border-top: 1px solid var(--warm-border);
            display: flex; justify-content: center; gap: 12px;
        }
        .bottom-btn {
            background: none; border: none;
            color: var(--warm-text-light); font-size: 13px;
            font-family: inherit; cursor: pointer; padding: 6px 12px; transition: color 0.2s;
        }
        .bottom-btn:hover { color: var(--warm-accent); }
        .bottom-btn.danger { color: #c0392b; }
        .bottom-btn.danger:hover { color: #e74c3c; }

        .edit-choices { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; max-height: 50vh; overflow-y: auto; }
        .edit-choice-btn {
            background: white; border: 1.5px solid var(--warm-border);
            border-radius: 10px; padding: 10px 14px;
            font-size: 14px; text-align: left;
            cursor: pointer; font-family: inherit; color: var(--warm-text); transition: all 0.2s;
        }
        .edit-choice-btn:hover { border-color: var(--warm-accent); background: #f0f7ff; }
        .edit-choice-btn.selected { border-color: var(--warm-accent); background: #f0f7ff; font-weight: 600; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--warm-card); border-radius: 16px;
            padding: 24px; max-width: 420px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .modal-title { font-size: 16px; font-weight: 700; color: var(--warm-accent); margin-bottom: 14px; }
        .modal-subtitle { font-size: 13px; color: var(--warm-text-light); margin-bottom: 14px; line-height: 1.6; }

        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 13px; font-weight: 600; color: var(--warm-text); margin-bottom: 4px; display: block; }
        .form-input {
            width: 100%; border: 2px solid var(--warm-border);
            border-radius: 10px; padding: 10px 14px;
            font-size: 14px; font-family: inherit;
            color: var(--warm-text); background: white; outline: none;
        }
        .form-input:focus { border-color: var(--warm-accent); }

        .btn-row { display: flex; gap: 10px; margin-top: 14px; }
        .btn-primary {
            flex: 1; background: var(--warm-accent); color: white;
            border: none; border-radius: 24px; padding: 11px 20px;
            font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .btn-primary:hover { background: #2d6a9e; }
        .btn-secondary {
            background: white; color: var(--warm-text-light);
            border: 2px solid var(--warm-border);
            border-radius: 24px; padding: 11px 20px;
            font-size: 14px; cursor: pointer; font-family: inherit;
        }
        .btn-secondary:hover { border-color: var(--warm-accent); color: var(--warm-accent); }

        @media (max-width: 600px) {
            .msg-bot, .msg-user, .msg-praise, .msg-care { max-width: 92%; font-size: 14px; }
            .choice-btn { font-size: 13px; padding: 9px 14px; }
            .header { padding: 8px 14px; }
            .header-title { font-size: 14px; }
        }

        body.device-sp .choice-btn { font-size: 15px; padding: 12px 18px; min-height: 44px; }
        body.device-sp .send-btn { width: 46px; height: 46px; }
        body.device-sp .input-area textarea { font-size: 16px; min-height: 46px; }
        body.device-sp .msg-bot, body.device-sp .msg-user,
        body.device-sp .msg-praise, body.device-sp .msg-care { font-size: 15px; }

        /* スタート画面 */
        .start-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(160deg, #e8f0fb 0%, #f0f4f8 60%, #e8f5ec 100%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            animation: fadeIn 0.4s ease;
        }
        .start-screen.hidden { display: none; }

        .start-logo {
            font-size: 52px;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 6px rgba(59,130,182,0.2));
        }
        .start-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--warm-accent);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .start-subtitle {
            font-size: 13px;
            color: var(--warm-text-light);
            margin-bottom: 36px;
            text-align: center;
            line-height: 1.7;
        }
        .start-card {
            background: white;
            border-radius: 20px;
            padding: 28px 28px 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 24px rgba(100,130,160,0.13);
        }
        .start-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--warm-text);
            margin-bottom: 8px;
            display: block;
        }
        .start-input {
            width: 100%;
            border: 2px solid var(--warm-border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            font-family: inherit;
            color: var(--warm-text);
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }
        .start-input:focus { border-color: var(--warm-accent); }
        .start-input::placeholder { color: #9bb0c4; }
        .start-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--warm-accent), #5a9ec0);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }
        .start-btn:hover { opacity: 0.92; }
        .start-btn:active { transform: scale(0.98); }
        .start-btn:disabled { opacity: 0.5; cursor: default; }

        /* 役割選択画面 */
        .role-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(160deg, #e8f0fb 0%, #f0f4f8 60%, #e8f5ec 100%);
            z-index: 300;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            animation: fadeIn 0.35s ease;
        }
        .role-screen.active { display: flex; }

        .role-greeting {
            font-size: 17px;
            font-weight: 700;
            color: var(--warm-text);
            margin-bottom: 6px;
            text-align: center;
        }
        .role-question {
            font-size: 14px;
            color: var(--warm-text-light);
            margin-bottom: 32px;
            text-align: center;
        }
        .role-buttons {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 360px;
        }
        .role-btn {
            flex: 1;
            background: white;
            border: 3px solid var(--warm-border);
            border-radius: 18px;
            padding: 28px 12px;
            text-align: center;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 2px 12px var(--warm-shadow);
        }
        .role-btn:hover {
            border-color: var(--warm-accent);
            background: #f0f7ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59,130,182,0.15);
        }
        .role-btn:active { transform: scale(0.97); }
        .role-btn-icon { font-size: 36px; display: block; margin-bottom: 10px; }
        .role-btn-label { font-size: 15px; font-weight: 700; color: var(--warm-text); }
        .role-btn-desc { font-size: 11px; color: var(--warm-text-light); margin-top: 4px; }

        /* AI hint area */
        .ai-hint {
            flex-shrink: 0;
            background: linear-gradient(135deg, #eef5ff, #f3efff);
            border-top: 1px solid #cce0f7;
            padding: 8px 16px;
            display: none;
            align-items: flex-start;
            gap: 6px;
            animation: fadeIn 0.3s ease;
        }
        .ai-hint.active { display: flex; }
        .ai-hint-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
        .ai-hint-body { font-size: 12px; color: #4a6090; line-height: 1.7; }
        .ai-hint-label { font-weight: 700; margin-right: 4px; color: #3b6abf; }
        .ai-hint-loading { color: #9bb0c4; font-style: italic; }

    </style>
</head>
<body>

<div class="header">
    <span class="header-title">📋 週報アシスタント</span>
    <div class="header-right">
        <button class="header-btn" onclick="showSettings()">⚙ 設定</button>
        <button class="header-btn" onclick="location.reload()">↺ リセット</button>
    </div>
</div>

<!-- 役割選択画面 -->
<div class="role-screen" id="roleScreen">
    <div class="start-logo">📋</div>
    <div class="role-greeting" id="roleGreeting"></div>
    <div class="role-question">役割を選んでください</div>
    <div class="role-buttons">
        <button class="role-btn" onclick="selectRole('リーダー')">
            <span class="role-btn-icon">👑</span>
            <span class="role-btn-label">リーダー</span>
            <div class="role-btn-desc">チームまとめ役</div>
        </button>
        <button class="role-btn" onclick="selectRole('居室担当')">
            <span class="role-btn-icon">🏠</span>
            <span class="role-btn-label">居室担当</span>
            <div class="role-btn-desc">利用者ケア担当</div>
        </button>
    </div>
</div>

<!-- スタート画面 -->
<div class="start-screen" id="startScreen">
    <div class="start-logo">📋</div>
    <div class="start-title">週報作成アシスタント</div>
    <div class="start-subtitle">介護・福祉スタッフの週報を<br>AIがサポートします</div>
    <div class="start-card">
        <label class="start-label" for="startNameInput">スタッフ名（またはニックネーム）</label>
        <input id="startNameInput" class="start-input" type="text" placeholder="例：田中、たなか など" maxlength="20" autocomplete="off">
        <button id="startBtn" class="start-btn" onclick="startApp()" disabled>はじめる ➤</button>
    </div>
</div>

<div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area" id="inputArea">
    <textarea id="userInput" placeholder="ここに入力してください..." rows="1"></textarea>
    <button class="send-btn" onclick="handleSend()">➤</button>
</div>

<!-- AI hint area -->
<div class="ai-hint" id="aiHint">
    <span class="ai-hint-icon">💡</span>
    <div class="ai-hint-body"><span class="ai-hint-label">AIアドバイス:</span><span id="aiHintText"></span></div>
</div>

<!-- 週報オーバーレイ -->
<div class="report-overlay" id="reportOverlay">
    <div class="report-overlay-header">
        <span class="report-overlay-title" id="reportOverlayTitle">📝 週報</span>
        <button class="report-overlay-close" onclick="closeReport()">チャットに戻る</button>
    </div>
    <div class="report-overlay-body">
        <div id="reportText" class="report-text" contenteditable="true"></div>
    </div>
    <div class="report-actions">
        <div class="share-banner">
            <button onclick="copyReport(this)"><span class="share-icon">📋</span>コピー</button>
            <button onclick="downloadPDF(this)"><span class="share-icon">📄</span>PDFダウンロード</button>
            <button onclick="openEditSection()"><span class="share-icon">✏</span>項目を修正して再生成</button>
            <button onclick="regenerateReport()"><span class="share-icon">🔄</span>再生成</button>
            <button onclick="startOver()"><span class="share-icon">🆕</span>新規作成</button>
        </div>
    </div>
</div>

<!-- 修正項目選択モーダル -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-title">✏ どの項目を修正しますか？</div>
        <div id="editChoices" class="edit-choices"></div>

async function handleSend() {
    if (isWaiting) return;
    const text = userInput.value.trim();
    if (!text) return;
    hideAiHint();
    hideInput();
    addUser(text);

    // ネガティブ検出
    if (!wellbeingAsked && detectNegative(text)) {
        negativeCount++;
        if (negativeCount >= 2) {
            await doWellbeingCheck();
            return;
        }
    }

    await processInput(text);
}

async function processInput(text) {
    isWaiting = true;
    try {
        switch(currentStep) {
            case 'ask_period':
                categoryAnswers['__period__'] = text;
                addProgress('✅ 期間を記録しました');
                currentStep = 'ask_category';
                await nextStep();
                break;

            case 'ask_category': {
                const catName = selectedCategories[currentCategoryIndex];
                categoryAnswers[catName] = text;
                addProgress(`✅ 【${catName}】を記録しました`);

                // AI深掘り（省略入力またはAPI無しはスキップ）
                if (text !== '省略' && text !== '特になし' && text !== 'なし' && text.length > 4) {
                    const loading = addLoading();
                    const aiComment = await aiReact(text, catName);
                    loading.remove();
                    if (aiComment.action === 'clarify') {
                        addBot(aiComment.message);
                        showInput('もう少し教えてください（「省略」で次へ）');
                        // 同じカテゴリのまま待機 → 次の入力で追記してから進む
                        isWaiting = false;
                        return;
                    } else {
                        addPraise(aiComment.message || 'ありがとうございます！記録しました。');
                        await delay(600);
                    }
                }

                currentCategoryIndex++;
                if (currentCategoryIndex < selectedCategories.length) {
                    await nextStep(); // 次のカテゴリへ
                } else {
                    currentStep = 'generating';
                    await nextStep();
                }
                break;
            }
        }
    } finally {
        isWaiting = false;
    }
}

// ============================================================
async function callClaude(systemPrompt, userMessage) {
    const key = apiKey;
    if (!key) throw new Error('APIキーが設定されていません');

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: selectedModel,
            max_tokens: 1024,
            system: systemPrompt,
            messages: [{ role: 'user', content: userMessage }]
        })
    });

    if (!resp.ok) throw new Error(`API error: ${resp.status}`);
    const data = await resp.json();
    return data.content[0].text;
}

async function aiReact(input, section) {
    try {
        const sectionNames = {
            going_well: 'よかったこと・うまくいったこと',
            not_well: '課題・うまくいかなかったこと',
            seasonal: '季節の業務・行事',
            new_tasks: '新しい取り組み・気づき'
        };
        const sectionName = sectionNames[section] || section;

        const systemPrompt = `あなたは介護・福祉施設のスタッフが週報を作成するのをサポートするアシスタントです。
スタッフが入力した内容を読んで、以下のどちらかを判断してください：
- clarify: もっと詳しく聞いたほうが良い（内容が曖昧・短すぎる場合）
- move_on: 十分な内容が得られた（次のステップへ進む）

応答はJSON形式で返してください：
{"action": "clarify" または "move_on", "message": "スタッフへの一言コメント（30字以内）"}

clarifyの場合は、具体的に何を聞けばよいか自然な問いかけ文にしてください。
move_onの場合は、入力内容を認め励ます短いコメントにしてください。
温かみのある丁寧な言葉を使い、介護スタッフへの敬意を示してください。`;

        const raw = await callClaude(systemPrompt, `セクション：${sectionName}\n入力内容：${input}`);
        const json = JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
        return json;
    } catch(e) {
        // フォールバック：5文字以下なら詳しく聞く
        if (input.length <= 5) {
            return { action: 'clarify', message: 'もう少し詳しく教えていただけますか？' };
        }
        return { action: 'move_on', message: 'ありがとうございます！しっかり記録できました。' };
    }
}

function buildCategoryData() {
    return selectedCategories.map(name => {
        const ans = categoryAnswers[name] || '未記入';
        return `【${name}】${ans}`;
    }).join('\n');
}

async function generateReport() {
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    const period = categoryAnswers['__period__'] || dateStr;
    const catData = buildCategoryData();

    const sections = selectedCategories.map(n => `■ ${n}\n（${residentName}様の${n}について記載）`).join('\n\n');

    const systemPrompt = `# CLAUDE_GUIDE.md に基づく介護週報整理ルール

あなたは特別養護老人ホームの専門スタッフとして、入力された雑多なメモを、CLAUDE_GUIDE.md のルールに従いプロフェッショナルな「介護週報」に整理してください。

## 1. 文章構成ルール（PREP法）
全ての項目は以下の順序を意識して構成すること。
- P (Point/結論): 利用者の現在の状態・結論。
- R (Reason/理由): なぜその状態になったか、背景や要因。
- E (Example/具体例): 具体的な数値（食事量、バイタル）や、具体的な言動の記述。
- P (Point/まとめ): 今後の対応方針、継続観察のポイント。

## 2. 記述の制約（プロフェッショナル・ライティング）
- バイアスの排除: 「困った」「大変だった」などの感情表現は避け、「〜の際に拒絶が見られた」「〜のケアに時間を要した」など客観的な観察事実のみを記述する。
- 5W1Hの明確化: 出来事については「いつ、どこで、誰が、何を、なぜ、どのように」が判別できるよう補完する。
- 語尾の統一: 「〜である」「〜が見られる」「〜と推察される」など客観的な報告調で統一する。

## 3. 用語・単位の扱い
- 食事摂取量は「主食○割、副食○割」または「○%」の形式で統一。
- 排泄・睡眠の状態は専門用語（失禁、中途覚醒など）を適切に使用。
- 多職種（看護師、ケアマネ等）が即座に状況判断できる表現を優先する。

## 出力形式
以下の形式で出力すること。各項目は2〜4文でまとめる。

【週報】${reporterName}（${reporterRole}） / ${residentName}様 / ${period}

${sections}

■ 総合所見・来週の支援方針
以下の手順で記述すること：
1. 今週の全体的な状態を1〜2文で総括する。
2. 各項目の記録メモ全体を精査し、以下を課題として抽出する：
   - 明示的に記述された未解決の問題・困難
   - ネガティブなニュアンスを含む表現（拒否・低下・悪化・不安定・要注意 等）
   - 数値の悪化傾向（体重減少・摂取量低下・血圧変動 等）
   - 言葉の端々から読み取れる詰まり・停滞・懸念
3. 抽出した課題を箇条書きで列挙する（例：「・食事摂取量の低下傾向に対する栄養面のアプローチ」）。
4. 各課題に対する来週の具体的な支援方針・観察ポイントを記述する。`;

    const userMsg = `担当スタッフ：${reporterName}（${reporterRole}）
担当入居者：${residentName}様
対象期間：${period}

【各項目の記録メモ】
${catData}`;

    return await callClaude(systemPrompt, userMsg);
}

function generateTemplate() {
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    const period = categoryAnswers['__period__'] || dateStr;
    const lines = selectedCategories.map(name =>
        `■ ${name}\n${categoryAnswers[name] || '（未記入）'}`
    ).join('\n\n');
    return `【週報】${reporterName}（${reporterRole}） / ${residentName}様 / ${period}

${lines}

■ 達成度・総合所見
達成度：${categoryAnswers['__progress__'] || '未記入'}

■ 来週の目標
${residentName}様への支援を引き続き丁寧に行います。`;
}

function openReport() {
    document.getElementById('reportText').textContent = generatedReport;
    document.getElementById('reportOverlayTitle').textContent = `📝 ${residentName}様 / ${reporterName}（${reporterRole}）`;
    document.getElementById('reportOverlay').classList.add('active');
}

function closeReport() {
    document.getElementById('reportOverlay').classList.remove('active');
}

async function downloadPDF(btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="share-icon">⏳</span>生成中...';
    btn.disabled = true;

    const text = document.getElementById('reportText').innerText || document.getElementById('reportText').textContent;
    const now = new Date();
    const fileName = `週報_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`;

    const el = document.createElement('div');
    el.style.cssText = 'font-family:"Noto Sans JP",sans-serif;font-size:13px;line-height:1.9;color:#2c3e50;padding:24px;white-space:pre-wrap;word-break:break-word;';
    el.textContent = text;

    const opt = {
        margin: [15, 15, 15, 15],
        filename: fileName,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    try {
        await html2pdf().set(opt).from(el).save();
    } catch(e) {
        alert('PDF生成に失敗しました。');
    }

    btn.innerHTML = orig;
    btn.disabled = false;
}

async function copyReport(btn) {
    const text = document.getElementById('reportText').innerText || document.getElementById('reportText').textContent;
    try {
        await navigator.clipboard.writeText(text);
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="share-icon">✅</span>コピー完了！';
        setTimeout(() => btn.innerHTML = orig, 2000);
    } catch(e) {
        alert('コピーに失敗しました。手動で選択してコピーしてください。');
    }
}

async function regenerateReport() {
    const overlay = document.getElementById('reportOverlay');
    const textEl = document.getElementById('reportText');
    textEl.textContent = '再生成中...';
    try {
        generatedReport = await generateReport();
    } catch(e) {
        generatedReport = generateTemplate();
    }
    textEl.textContent = generatedReport;
}

function startOver() {
    if (confirm('新しい週報を作成します。現在の内容は消えますがよろしいですか？')) {
        location.reload();
    }
}

// ============================================================
// AIリアルタイムヒント
// ============================================================
let hintTimer = null;
let hintAbortController = null;

function showAiHint(text) {
    document.getElementById('aiHintText').textContent = text;
    document.getElementById('aiHint').classList.add('active');
}

function showAiHintLoading() {
    document.getElementById('aiHintText').innerHTML = '<span class="ai-hint-loading">考え中...</span>';
    document.getElementById('aiHint').classList.add('active');
}

function hideAiHint() {
    clearTimeout(hintTimer);
    if (hintAbortController) { hintAbortController.abort(); hintAbortController = null; }
    document.getElementById('aiHint').classList.remove('active');
}

async function updateAiHint(text) {
    clearTimeout(hintTimer);
    if (!apiKey || text.length < 8 || currentStep !== 'ask_category') {
        hideAiHint();
        return;
    }
    hintTimer = setTimeout(async () => {
        const catName = selectedCategories[currentCategoryIndex];
        if (!catName) return;
        showAiHintLoading();
        if (hintAbortController) hintAbortController.abort();
        hintAbortController = new AbortController();
        try {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                signal: hintAbortController.signal,
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 60,
                    system: `介護週報【${catName}】の項目を入力中のスタッフへ、入力内容を踏まえて「次に追記すると週報が充実する情報」を20〜35字の自然な一文でアドバイスしてください。「〜も記入しましょう」「〜はいかがでしたか？」形式で。`,
                    messages: [{ role: 'user', content: text }]
                })
            });
            if (!resp.ok) { hideAiHint(); return; }
            const data = await resp.json();
            showAiHint(data.content[0].text.trim());
        } catch(e) {
            if (e.name !== 'AbortError') hideAiHint();
        }
    }, 700);
}

userInput.addEventListener('keydown', (e) => {
